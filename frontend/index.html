<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PWSense Web</title>
  </head>
  <body>
    <div id="root">
      <noscript>PWSense Web requires JavaScript. Please enable it and reload.</noscript>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('error', function (e) {
        var root = document.getElementById('root');
        if (root && root.children.length === 0) {
          root.innerHTML = '<div style="padding:24px;font-family:sans-serif;"><h2>Load error</h2><p>Open the browser console (F12) for details.</p><pre style="background:#f5f5f5;padding:12px;overflow:auto;">' + (e.message || '') + '</pre></div>';
        }
      });
    </script>
  </body>
</html>
